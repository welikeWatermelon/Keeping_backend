# Redis Configuration for Payment Rollback Streams
# 결제 데이터 정합성을 위한 AOF 영속성 설정

# =============================================================================
# AOF (Append Only File) 설정 - 필수
# =============================================================================

# AOF 활성화 (필수 - 결제 롤백 이벤트 유실 방지)
appendonly yes

# 결제 데이터 정합성을 위해 everysec 권장
# - always: 매 명령마다 디스크 쓰기 (가장 안전, 성능 저하)
# - everysec: 1초마다 디스크 쓰기 (권장, 최대 1초 유실 가능)
# - no: OS에 위임 (가장 빠름, 유실 위험)
appendfsync everysec

# AOF 파일 이름
appendfilename "appendonly.aof"

# AOF rewrite 중 fsync 비활성화 (성능 향상, 약간의 유실 가능성)
no-appendfsync-on-rewrite no

# =============================================================================
# AOF Rewrite 설정 (파일 크기 최적화)
# =============================================================================

# AOF 파일이 이전 rewrite 이후 100% 증가하면 rewrite 실행
auto-aof-rewrite-percentage 100

# AOF 파일이 최소 64MB 이상일 때만 rewrite 실행
auto-aof-rewrite-min-size 64mb

# =============================================================================
# RDB (Redis Database) 스냅샷 설정 - AOF와 혼용 권장
# =============================================================================

# RDB: 빠른 복구용 스냅샷
# AOF: 정밀한 데이터 복구

# 900초(15분) 동안 1개 이상 변경 시 스냅샷
save 900 1

# 300초(5분) 동안 10개 이상 변경 시 스냅샷
save 300 10

# 60초 동안 10000개 이상 변경 시 스냅샷
save 60 10000

# RDB 파일 이름
dbfilename dump.rdb

# 데이터 디렉토리
dir ./

# =============================================================================
# 메모리 관리
# =============================================================================

# 최대 메모리 설정 (필요에 따라 조정)
# maxmemory 256mb

# 메모리 초과 시 정책 (스트림은 MAXLEN으로 관리하므로 noeviction 권장)
# maxmemory-policy noeviction

# =============================================================================
# 네트워크 설정
# =============================================================================

# 바인드 주소 (프로덕션에서는 특정 IP로 제한)
# bind 127.0.0.1

# 포트
port 6379

# TCP keepalive (초)
tcp-keepalive 300

# =============================================================================
# 로깅
# =============================================================================

# 로그 레벨 (debug, verbose, notice, warning)
loglevel notice

# 로그 파일 (빈 문자열이면 stdout)
logfile ""
