events {
    worker_connections 1024;
}

http {
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent '
                    'upstream: $upstream_addr';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # 백엔드 서버 그룹
    upstream monolith {
        server monolith:8080;
    }

    upstream qr-service {
        server qr-service:8082;
    }

    server {
        listen 80;
        server_name localhost;

        # ========================================
        # 내부 인증 검증용 (외부 접근 불가)
        # ========================================
        location = /internal/auth/verify {
            internal;  # 외부에서 직접 접근 불가
            proxy_pass http://monolith/auth/verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
        }

        # ========================================
        # 인증 불필요한 경로
        # ========================================

        # Nginx 헬스체크
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # 로그인/회원가입 (인증 불필요)
        location /auth/login {
            proxy_pass http://monolith;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /auth/refresh {
            proxy_pass http://monolith;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;
        }

        location /auth/logout {
            proxy_pass http://monolith;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;
        }

        location /oauth2 {
            proxy_pass http://monolith;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /login/oauth2 {
            proxy_pass http://monolith;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # LoadTest API (테스트용)
        location /api/loadtest {
            proxy_pass http://monolith;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-LoadTest-Auth $http_x_loadtest_auth;
        }

        # ========================================
        # QR Service (JWT 직접 검증)
        # ========================================

        # QR 토큰 API → QR Service
        location /api/qr {
            proxy_pass http://qr-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;

            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # CPQR 결제 의도 생성 → QR Service (점주용)
        location ~ ^/cpqr/([^/]+)/initiate$ {
            proxy_pass http://qr-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Idempotency-Key $http_idempotency_key;

            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # 결제 승인 → QR Service (고객용)
        location ~ ^/payments/([^/]+)/approve$ {
            proxy_pass http://qr-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Idempotency-Key $http_idempotency_key;

            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # 결제 의도 상세 조회 → QR Service
        location ~ ^/api/payments/intent/([^/]+)$ {
            proxy_pass http://qr-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;

            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # ========================================
        # 인증 필요한 경로 (Monolith API)
        # ========================================
        location /api {
            auth_request /internal/auth/verify;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $customer_id $upstream_http_x_customer_id;
            auth_request_set $owner_id $upstream_http_x_owner_id;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_pass http://monolith;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-Customer-Id $customer_id;
            proxy_set_header X-Owner-Id $owner_id;
            proxy_set_header X-User-Role $user_role;
        }

        # ========================================
        # 기타 (인증 불필요)
        # ========================================
        location / {
            proxy_pass http://monolith;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
