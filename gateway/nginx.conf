events {
    worker_connections 1024;
}

http {
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent '
                    'upstream: $upstream_addr';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # 백엔드 서버 그룹
    upstream monolith {
        server monolith:8080;
    }

    upstream qr-service {
        server qr-service:8082;
    }

    server {
        listen 80;
        server_name localhost;

        # Nginx 헬스체크
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # LoadTest API
        location /api/loadtest {
            proxy_pass http://monolith;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-LoadTest-Auth $http_x_loadtest_auth;
        }

        # QR 토큰 API → QR Service (Redis 기반)
        location /api/qr {
            proxy_pass http://qr-service;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Customer-Id $http_x_customer_id;
            proxy_set_header X-LoadTest-Auth $http_x_loadtest_auth;

            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # CPQR 결제 의도 생성 → QR Service
        location ~ ^/cpqr/([^/]+)/initiate$ {
            proxy_pass http://qr-service;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Idempotency-Key $http_idempotency_key;
            proxy_set_header X-Owner-Id $http_x_owner_id;

            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # 결제 승인 → QR Service
        location ~ ^/payments/([^/]+)/approve$ {
            proxy_pass http://qr-service;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Idempotency-Key $http_idempotency_key;
            proxy_set_header X-Customer-Id $http_x_customer_id;

            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # 결제 의도 상세 조회 → QR Service
        location ~ ^/api/payments/intent/([^/]+)$ {
            proxy_pass http://qr-service;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;

            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # 나머지 → 모놀리스
        location / {
            proxy_pass http://monolith;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-LoadTest-Auth $http_x_loadtest_auth;
        }
    }
}
