server:
  port: 8081

spring:
  application:
    name: qr-payment-service

  # Redis 설정
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# JWT 설정 (모놀리스와 같은 키 사용!)
jwt:
  secret: ${JWT_SECRET:your-secret-key}

# 모놀리스 URL (ACL 호출용)
monolith:
  url: ${MONOLITH_URL:http://localhost:8080}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
