server:
  port: 8082

spring:
  application:
    name: qr-service

  # Redis 설정 (QR 토큰 저장)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # JPA/MySQL 설정
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/payment_service?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# JWT 설정 (모놀리스와 같은 키 사용!)
jwt:
  secret: ${JWT_SECRET:NbPg+8/rCm9yW15pYbbOTXdg1QTPqDcRMA8oauseuOqzrAdkLMcXfmbMLkqt3tZ5HecMd5bnCscx4Iuo2EjnJA==}
  issuer: kakao-oauth2-jwt

# 모놀리스 URL (ACL 호출용)
monolith:
  url: ${MONOLITH_URL:http://localhost:8080}

# 내부 서비스 통신 토큰
internal:
  auth-token: ${INTERNAL_AUTH_TOKEN:internal-service-token-12345}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# 로드테스트 백도어 (테스트용)
loadtest:
  backdoor:
    enabled: ${LOADTEST_BACKDOOR_ENABLED:false}
