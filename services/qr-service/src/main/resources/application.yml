server:
  port: 8082

spring:
  application:
    name: qr-service

  # Redis 설정 (QR 토큰 저장)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # JPA/MySQL 설정
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/payment_service?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # Spring Cache (Redis)
  cache:
    type: redis

# JWT 설정 (모놀리스와 같은 키 사용!)
jwt:
  secret: ${JWT_SECRET:NbPg+8/rCm9yW15pYbbOTXdg1QTPqDcRMA8oauseuOqzrAdkLMcXfmbMLkqt3tZ5HecMd5bnCscx4Iuo2EjnJA==}
  issuer: kakao-oauth2-jwt

# 모놀리스 URL (ACL 호출용)
monolith:
  url: ${MONOLITH_URL:http://localhost:8080}

# 내부 서비스 통신 토큰
internal:
  auth-token: ${INTERNAL_AUTH_TOKEN:internal-service-token-12345}

# 캐시 모드 및 워밍 설정
cache:
  # 캐시 모드: NONE / PULL / PUSH
  mode: ${CACHE_MODE:PUSH}
  warming:
    enabled: ${CACHE_WARMING_ENABLED:true}

# Actuator + Tracing
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0  # 100% 샘플링 (개발용, 운영에서는 0.1 권장)
    enabled: true
  zipkin:
    tracing:
      enabled: false  # Zipkin 서버 없이 로그 기반 추적

# OpenAPI 문서화
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# 로깅 (TraceId 포함)
logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

# 로드테스트 백도어 (테스트용)
loadtest:
  backdoor:
    enabled: ${LOADTEST_BACKDOOR_ENABLED:false}

# RestTemplate 타임아웃 (용도별 분리)
rest-template:
  connect-timeout: 3000   # 3초 (기존 10초)
  read-timeout: 5000      # 5초 (기존 30초)

rest-template-write:
  connect-timeout: 2000   # 2초
  read-timeout: 3000      # 3초 (Fail-Fast)

rest-template-recovery:
  connect-timeout: 5000   # 5초
  read-timeout: 10000     # 10초 (복구는 여유있게)

# Resilience4j 설정
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
      strict:  # WalletClient용 (엄격)
        slidingWindowSize: 5
        minimumNumberOfCalls: 3
        failureRateThreshold: 40
        waitDurationInOpenState: 30s  # 기존 60s → 30s
      lenient:  # NotificationClient용 (관대)
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 70
        waitDurationInOpenState: 15s
      recovery:  # 복구용 (여유있는 설정)
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 60
        waitDurationInOpenState: 15s
    instances:
      walletClient:
        baseConfig: strict
      walletClientRecovery:
        baseConfig: recovery
      customerClient:
        baseConfig: default
      storeClient:
        baseConfig: default
      menuClient:
        baseConfig: default
      notificationClient:
        baseConfig: lenient

  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
      strict:  # WalletClient 쓰기용 (재시도 없음 - Fail-Fast)
        maxAttempts: 1
        waitDuration: 0ms
      lenient:  # NotificationClient용
        maxAttempts: 2
        waitDuration: 200ms
      recovery:  # 복구용 (재시도 허용)
        maxAttempts: 3
        waitDuration: 2000ms
    instances:
      walletClient:
        baseConfig: strict
      walletClientReadOnly:
        baseConfig: default
      walletClientRecovery:
        baseConfig: recovery
      customerClient:
        baseConfig: default
      storeClient:
        baseConfig: default
      menuClient:
        baseConfig: default
      notificationClient:
        baseConfig: lenient
