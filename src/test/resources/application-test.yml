spring:
  application:
    name: KEEPING-TEST

  jpa:
    hibernate:
      ddl-auto: create-only
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

  sql:
    init:
      mode: never

  main:
    allow-bean-definition-overriding: true

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: test
            client-secret: test
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: profile_nickname
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  test:
    database:
      replace: none

  datasource:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      pool-name: TestHikariPool

logging:
  level:
    root: WARN
    com.ssafy.keeping: INFO
    org.springframework.jdbc.core: WARN

fcm:
  enabled: false
  service-account-file: classpath:firebase/dummy.json
  project-id: "test"

cloud:
  aws:
    stack:
      auto: false
    credentials:
      access-key: test
      secret-key: test
    region:
      static: ap-northeast-2
    s3:
      bucket: test-bucket

fe:
  base-url: http://localhost:3000

sms:
  api-key: test
  api-secret: test
  send-number: "01000000000"
  base-url: https://api.coolsms.co.kr

jwt:
  secret: testtesttesttesttesttesttesttest
